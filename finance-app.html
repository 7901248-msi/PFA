<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Vault — Personal Finance</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">

  <div class="mobile-drawer-backdrop" id="drawerBackdrop"></div>
  <aside class="mobile-drawer" id="mobileDrawer">
    <div class="mobile-drawer-header">
      <div class="logo">
        <div class="pulse-ring"><div class="dot"></div></div>
        <span class="logo-text">VAULT<span>.</span></span>
      </div>
      <button class="mobile-drawer-close" id="drawerClose">✕</button>
    </div>
    <nav class="mobile-drawer-nav" id="drawerNav"></nav>
    <div class="mobile-drawer-footer">
      <div class="security-badge" style="margin-bottom:10px">
        <div class="indicator"></div>
        256-bit AES
      </div>
      <button id="btnSignOut" style="width:100%;padding:9px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-family:var(--sans);cursor:pointer;">
        Sign Out
      </button>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger-btn" id="hamburgerBtn" aria-label="Open menu">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <span class="page-title" id="pageTitle">Dashboard</span>
      </div>
      <div class="topbar-right">
        <button class="btn btn-primary" id="btnAddTransaction">+ Add</button>
        <div class="avatar">JD</div>
      </div>
    </header>

    <div class="content" id="loansView" style="display:none">
      <div class="section-header" style="margin-bottom:16px">
        <span class="section-title" style="font-size:15px">Loans &amp; Lending</span>
        <button class="btn btn-primary" id="btnAddLoan">+ Add</button>
      </div>
      <div id="loansEmptyState" class="card">
        <div style="font-size:26px;margin-bottom:10px">💳</div>
        <div style="font-size:13px;color:var(--subtle);margin-bottom:4px">No loans tracked yet</div>
        <div style="font-size:11.5px;font-family:var(--mono)">Add a loan you owe, or money lent to someone.</div>
      </div>
      <div id="loansList" style="display:flex;flex-direction:column;gap:10px"></div>
    </div>

  </div><!-- /main -->

  <nav class="bottom-nav" id="bottomNav">
    <button class="bottom-nav-item active" data-page="Dashboard">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1.5" fill="currentColor" opacity=".8"/><rect x="13" y="3" width="8" height="8" rx="1.5" fill="currentColor"/><rect x="3" y="13" width="8" height="8" rx="1.5" fill="currentColor"/><rect x="13" y="13" width="8" height="8" rx="1.5" fill="currentColor" opacity=".5"/></svg>
      Dashboard
    </button>
    <button class="bottom-nav-item" data-page="Transactions">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24"><path d="M3 9h18M7 3v2m10-2v2M3 7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      Transactions
    </button>
    <button class="bottom-nav-item" data-page="Budgets">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93V18a1 1 0 0 0-2 0v1.93C7.06 19.44 4.56 16.94 4.07 14H6a1 1 0 0 0 0-2H4.07C4.56 9.06 7.06 6.56 10 6.07V8a1 1 0 0 0 2 0V6.07c2.94.49 5.44 2.99 5.93 5.93H16a1 1 0 0 0 0 2h1.93c-.49 2.94-2.99 5.44-5.93 5.93z" fill="currentColor" opacity=".7"/></svg>
      Budgets
    </button>
    <button class="bottom-nav-item" data-page="Loans">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M9 12h6M12 9v6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      Loans
    </button>
  </nav>
</div>

<script type="module">
  // ── Auth guard ──
  // Import Supabase client and check session on load.
  // If no valid session, redirect to login page immediately.
  import { getSession, signOut, onAuthStateChange, saveTransaction, saveLoan, loadLoans } from './supabase.js';

  const session = await getSession();
  if (!session) { window.location.replace('./login.html'); }

  // Listen for auth changes (e.g. session expiry) and redirect
  onAuthStateChange((s) => { if (!s) window.location.replace('./login.html'); });

  const PAGE_MAP = {
    'Dashboard':    'page-dashboard.html',
    'Transactions': 'page-transactions.html',
    'Budgets':      'page-budgets.html',
    'Accounts':     'page-accounts.html',
    'Investments':  'page-investments.html',
    'Loans':        null,
    'Security':     null,
  };

  const loansView  = document.getElementById('loansView');
  const pageTitleEl = document.getElementById('pageTitle');

  let pendingBudgetSpend  = [];
  let pendingTransactions = [];        // for Dashboard
  let pendingLedgerEntries = [];       // for the Transactions ledger page
  let budgetFrameWindow      = null;
  let dashboardFrameWindow   = null;
  let transactionsFrameWindow = null;
  let accountsFrameWindow     = null;

  // Canonical account registry — single source of truth.
  // The accounts page, transaction modal dropdown, and dashboard summary
  // all derive their account data from this array via broadcast functions.
  let canonicalAccounts = []; // populated once page-accounts.html loads and calls onAccountsChange

  const CATEGORY_KEY_MAP = {
    housing: 'Housing', food: 'Food', dining: 'Dining', transport: 'Transport',
    health: 'Medical', subscriptions: 'Subscriptions', utilities: 'Utilities',
    shopping: 'Shopping', travel: 'Travel', salary: null, investment: null,
    other: 'Other',
  };

  function sendSpendToBudgetPage(cat, amount) {
    const mappedCat = CATEGORY_KEY_MAP[cat] ?? cat;
    if (!mappedCat) return;
    if (budgetFrameWindow && budgetFrameWindow.BudgetPage) {
      budgetFrameWindow.BudgetPage.addSpend(mappedCat, amount);
    } else {
      pendingBudgetSpend.push({ cat: mappedCat, amount });
    }
  }

  function sendTransactionToDashboard(tx) {
    if (dashboardFrameWindow && dashboardFrameWindow.DashboardPage) {
      dashboardFrameWindow.DashboardPage.addTransaction(tx);
    } else {
      pendingTransactions.push(tx);
    }
  }

  function sendTransactionToLedger(tx) {
    if (transactionsFrameWindow && transactionsFrameWindow.TransactionsPage) {
      transactionsFrameWindow.TransactionsPage.addTransaction(tx);
    } else {
      pendingLedgerEntries.push(tx);
    }
  }

  // Broadcast updated account list to all consumers: transaction modal dropdown,
  // dashboard account summary strip, and the accounts page itself if mounted.
  function broadcastAccounts(accounts) {
    canonicalAccounts = accounts;

    // Update transaction modal dropdown if it's currently open
    if (modalFrame && modalFrame.contentWindow && modalFrame.contentWindow.TransactionModal) {
      modalFrame.contentWindow.TransactionModal.setAccounts(accounts);
    }

    // Update loan modal dropdown if it's currently open
    if (loanModalFrame && loanModalFrame.contentWindow && loanModalFrame.contentWindow.LoanModal) {
      loanModalFrame.contentWindow.LoanModal.setAccounts(accounts);
    }

    // Update dashboard account summary strip
    if (dashboardFrameWindow && dashboardFrameWindow.DashboardPage) {
      dashboardFrameWindow.DashboardPage.updateAccounts(accounts);
    }
  }

  // Push a transaction into the accounts page for balance tracking.
  function applyTransactionToAccounts(tx) {
    if (accountsFrameWindow && accountsFrameWindow.AccountsPage) {
      if (tx.type === 'transfer') {
        accountsFrameWindow.AccountsPage.applyTransfer(tx.fromAccount, tx.toAccount, tx.amount);
      } else {
        accountsFrameWindow.AccountsPage.applyTransaction(tx);
      }
    }
    // Note: no pending queue here. If the accounts page isn't loaded yet,
    // the balance will catch up from the opening balance + tx history once
    // Supabase persistence is added. For now, account balances only update
    // when the Accounts page is loaded in-session.
  }

  const pageFrames = {};

  function showFrame(frame) {
    Object.assign(frame.style, { position: 'static', left: '', top: '', width: '100%', height: '100%', pointerEvents: 'auto' });
  }
  function hideFrame(frame) {
    Object.assign(frame.style, { position: 'absolute', left: '-9999px', top: '0', width: '1px', height: '1px', pointerEvents: 'none' });
  }

  function loadPage(name) {
    const src = PAGE_MAP[name];
    pageTitleEl.textContent = name;

    loansView.style.display = (name === 'Loans') ? '' : 'none';
    Object.values(pageFrames).forEach(hideFrame);

    if (!src) return;

    if (pageFrames[name]) {
      showFrame(pageFrames[name]);
      return;
    }

    const frame = document.createElement('iframe');
    frame.src = src;
    Object.assign(frame.style, { width: '100%', border: 'none', background: 'transparent', display: 'block', minHeight: 'calc(100vh - 54px)' });

    if (name === 'Budgets') {
      frame.addEventListener('load', () => {
        budgetFrameWindow = frame.contentWindow;
        if (pendingBudgetSpend.length && budgetFrameWindow.BudgetPage) {
          pendingBudgetSpend.forEach(({ cat, amount }) => budgetFrameWindow.BudgetPage.addSpend(cat, amount));
          pendingBudgetSpend = [];
        }
      });
    }

    if (name === 'Dashboard') {
      frame.addEventListener('load', () => {
        dashboardFrameWindow = frame.contentWindow;
        if (pendingTransactions.length && dashboardFrameWindow.DashboardPage) {
          pendingTransactions.forEach(tx => dashboardFrameWindow.DashboardPage.addTransaction(tx));
          pendingTransactions = [];
        }
        // Push current account list so dashboard shows real accounts immediately
        if (canonicalAccounts.length && dashboardFrameWindow.DashboardPage) {
          dashboardFrameWindow.DashboardPage.updateAccounts(canonicalAccounts);
        }
      });
    }

    if (name === 'Transactions') {
      frame.addEventListener('load', () => {
        transactionsFrameWindow = frame.contentWindow;
        if (pendingLedgerEntries.length && transactionsFrameWindow.TransactionsPage) {
          pendingLedgerEntries.forEach(tx => transactionsFrameWindow.TransactionsPage.addTransaction(tx));
          pendingLedgerEntries = [];
        }
      });
    }

    if (name === 'Accounts') {
      frame.addEventListener('load', () => {
        accountsFrameWindow = frame.contentWindow;
        if (accountsFrameWindow.AccountsPage) {
          // Wire the broadcast — whenever accounts change in the accounts page,
          // push the updated list to all consumers (dashboard, transaction modal)
          accountsFrameWindow.AccountsPage.onAccountsChange = (accounts) => {
            broadcastAccounts(accounts);
          };
        }
      });
    }

    document.querySelector('.main').appendChild(frame);
    pageFrames[name] = frame;
  }

  const btnAdd = document.getElementById('btnAddTransaction');

  // Page-to-action map: what the + Add button does per page, and its label.
  // Pages with their own internal add flow (Budgets, Accounts, Security)
  // hide the topbar button to avoid duplicate entry points and confusion.
  const PAGE_ADD_ACTION = {
    'Dashboard':    { label: '+ Add', show: true,  action: () => openTransactionModal() },
    'Transactions': { label: '+ Add', show: true,  action: () => openTransactionModal() },
    'Budgets':      { label: '',      show: false,  action: null },
    'Loans':        { label: '+ Add', show: true,  action: () => openLoanModal() },
    'Accounts':     { label: '',      show: false,  action: null },
    'Investments':  { label: '',      show: false,  action: null },
    'Security':     { label: '',      show: false,  action: null },
  };
  let currentPageAction = null;

  btnAdd.addEventListener('click', () => {
    if (currentPageAction) currentPageAction();
  });

  function updateTopbarButton(name) {
    const cfg = PAGE_ADD_ACTION[name] || { label: '+ Add', show: true, action: () => openTransactionModal() };
    btnAdd.textContent = cfg.label;
    btnAdd.style.display = cfg.show ? '' : 'none';
    currentPageAction = cfg.action;
  }

  function navigateTo(name) {
    document.querySelectorAll('.bottom-nav-item').forEach(b => b.classList.toggle('active', b.dataset.page === name));
    document.querySelectorAll('.drawer-nav-item').forEach(b => b.classList.toggle('active', b.dataset.page === name));
    closeDrawer();
    updateTopbarButton(name);
    loadPage(name);
  }

  document.querySelectorAll('.bottom-nav-item').forEach(btn => {
    btn.addEventListener('click', () => navigateTo(btn.dataset.page));
  });

  const SECONDARY_NAV_ITEMS = [
    { name: 'Accounts',    icon: '<svg width="15" height="15" fill="none" viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="14" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M2 10h20" stroke="currentColor" stroke-width="1.8"/><circle cx="6.5" cy="15" r="1.5" fill="currentColor"/></svg>' },
    { name: 'Investments', icon: '<svg width="15" height="15" fill="none" viewBox="0 0 24 24"><path d="M3 3v18h18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M7 14l4-4 4 4 4-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>' },
    { name: 'Security',    icon: '<svg width="15" height="15" fill="none" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V6l-8-4-8 4v6c0 6 8 10 8 10Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="m9 12 2 2 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>' },
  ];

  const drawerNav = document.getElementById('drawerNav');
  drawerNav.innerHTML = SECONDARY_NAV_ITEMS.map(item => `
    <button class="drawer-nav-item" data-page="${item.name}">${item.icon}<span>${item.name}</span></button>
  `).join('');
  drawerNav.querySelectorAll('.drawer-nav-item').forEach(btn => {
    btn.addEventListener('click', () => navigateTo(btn.dataset.page));
  });

  const mobileDrawer   = document.getElementById('mobileDrawer');
  const drawerBackdrop = document.getElementById('drawerBackdrop');
  const hamburgerBtn   = document.getElementById('hamburgerBtn');
  const drawerClose    = document.getElementById('drawerClose');

  function openDrawer()  { mobileDrawer.classList.add('open');    drawerBackdrop.classList.add('open'); }
  function closeDrawer() { mobileDrawer.classList.remove('open'); drawerBackdrop.classList.remove('open'); }

  hamburgerBtn.addEventListener('click', openDrawer);
  drawerClose.addEventListener('click', closeDrawer);
  drawerBackdrop.addEventListener('click', closeDrawer);

  let modalFrame = null;

  function openTransactionModal() {
    if (modalFrame) { modalFrame.remove(); modalFrame = null; }

    const frame = document.createElement('iframe');
    frame.src = 'modal-add-transaction.html';
    frame.id  = 'transactionModalFrame';
    Object.assign(frame.style, { position: 'fixed', inset: '0', width: '100%', height: '100%', border: 'none', zIndex: '200', background: 'transparent' });
    frame.allow = 'clipboard-write';

    frame.addEventListener('load', () => {
      const win = frame.contentWindow;

      // Push current account list into the modal dropdown immediately
      if (canonicalAccounts.length && win.TransactionModal) {
        win.TransactionModal.setAccounts(canonicalAccounts);
      }

      win.TransactionModal.onSave = async (tx) => {
        // Persist to Supabase first, get back the real DB id
        try {
          const saved = await saveTransaction(tx);
          tx.id = saved.id; // replace temp UUID with DB id
        } catch (err) {
          console.error('[Vault] Failed to save transaction:', err.message);
          // Continue with in-memory update even if DB write fails,
          // so the UI doesn't appear broken during connectivity issues.
        }
        sendTransactionToDashboard(tx);
        sendTransactionToLedger(tx);
        if (tx.type === 'expense' && tx.category) sendSpendToBudgetPage(tx.category, tx.amount);
        applyTransactionToAccounts(tx);
      };
      win.TransactionModal.onClose = () => { setTimeout(() => { frame.remove(); modalFrame = null; }, 200); };
    });

    document.body.appendChild(frame);
    modalFrame = frame;
  }

  // btnAddTransaction is now handled by updateTopbarButton/PAGE_ADD_ACTION above

  let loans = [];
  let loanModalFrame = null;

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function openLoanModal() {
    if (loanModalFrame) { loanModalFrame.remove(); loanModalFrame = null; }

    const frame = document.createElement('iframe');
    frame.src = 'modal-loans.html';
    frame.id  = 'loanModalFrame';
    Object.assign(frame.style, { position: 'fixed', inset: '0', width: '100%', height: '100%', border: 'none', zIndex: '200', background: 'transparent' });

    frame.addEventListener('load', () => {
      const win = frame.contentWindow;

      // Push current account list into the loan modal account dropdown
      if (canonicalAccounts.length && win.LoanModal) {
        win.LoanModal.setAccounts(canonicalAccounts);
      }

      win.LoanModal.onSave = async (loan) => {
        try {
          const id = await saveLoan(loan);
          loan.id = id;
        } catch (err) {
          console.error('[Vault] Failed to save loan:', err.message);
        }
        loans.push(loan);
        renderLoansList();
      };
      win.LoanModal.onClose = () => { setTimeout(() => { frame.remove(); loanModalFrame = null; }, 200); };
    });

    document.body.appendChild(frame);
    loanModalFrame = frame;
  }

  document.getElementById('btnAddLoan').addEventListener('click', openLoanModal);

  function renderLoansList() {
    const listEl  = document.getElementById('loansList');
    const emptyEl = document.getElementById('loansEmptyState');

    if (loans.length === 0) {
      emptyEl.style.display = '';
      listEl.innerHTML = '';
      return;
    }
    emptyEl.style.display = 'none';

    const typeEmoji = { mortgage: '🏠', auto: '🚗', student: '🎓', personal: '💳', other: '•••' };

    listEl.innerHTML = loans.map(loan => {
      const owe = loan.direction === 'owe';
      const emoji = owe ? (typeEmoji[loan.loanType] || '💳') : '🤝';
      const accent = owe ? 'var(--red)' : 'var(--sage)';
      const pct = loan.principal > 0 ? Math.round(((loan.principal - loan.balance) / loan.principal) * 100) : 0;
      const currency = loan.currency || 'MVR';

      return `
        <div class="card card-sm" style="display:flex;align-items:center;gap:14px">
          <div class="tx-icon" style="background:${owe ? 'rgba(224,82,82,0.12)' : 'rgba(74,155,142,0.12)'};flex-shrink:0">${emoji}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;color:var(--text)">${escHtml(loan.name)}</div>
            <div style="font-size:10.5px;font-family:var(--mono);color:var(--muted);margin-top:2px">${owe ? 'Owed to' : 'Owed by'} ${escHtml(loan.party)}${loan.rate ? ` · ${loan.rate}% APR` : ''}</div>
          </div>
          <div style="text-align:right">
            <div style="font-family:var(--mono);font-size:15px;font-weight:500;color:${accent}">${currency} ${loan.balance.toFixed(2)}</div>
            <div style="font-size:10px;font-family:var(--mono);color:var(--muted)">${owe ? pct + '% paid off' : 'outstanding'}</div>
          </div>
        </div>`;
    }).join('');
  }

  loadPage('Dashboard');

  // Load persisted loans from Supabase on app start
  async function initLoans() {
    try {
      const rows = await loadLoans();
      loans = rows.map(row => ({
        id:        row.id,
        direction: row.direction,
        loanType:  row.loan_type,
        name:      row.name,
        party:     row.party,
        currency:  row.currency,
        principal: parseFloat(row.principal),
        balance:   parseFloat(row.balance),
        payment:   row.payment ? parseFloat(row.payment) : null,
        rate:      row.rate    ? parseFloat(row.rate)    : null,
        frequency: row.frequency,
        dueDate:   row.due_date,
        reminder:  row.reminder,
        notes:     row.notes || '',
      }));
      renderLoansList();
    } catch (err) {
      console.error('[Vault] Failed to load loans:', err.message);
    }
  }
  initLoans();

  // Sign out
  document.getElementById('btnSignOut').addEventListener('click', async () => {
    // Destroy all cached page iframes before signing out so they don't
    // retain stale data or session state for the next user who signs in.
    Object.values(pageFrames).forEach(f => f.remove());
    Object.keys(pageFrames).forEach(k => delete pageFrames[k]);
    budgetFrameWindow = null;
    dashboardFrameWindow = null;
    transactionsFrameWindow = null;
    accountsFrameWindow = null;
    canonicalAccounts = [];
    await signOut();
    window.location.replace('./login.html');
  });
</script>
</body>
</html>
